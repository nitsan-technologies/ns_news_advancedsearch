services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  NITSAN\NsNewsAdvancedsearch\EventListener\ModifyFlexformEvent:
      tags:
          - name: event.listener
            identifier: 'flexParsing'
            event: TYPO3\CMS\Core\Configuration\Event\AfterFlexFormDataStructureParsedEvent

  NITSAN\NsNewsAdvancedsearch\Utility\ClassCacheManager:
    arguments: ['@news.cache']
    public: true

  NITSAN\NsNewsAdvancedsearch\Utility\ClassLoader:
    arguments: ['@news.cache', '@NITSAN\NsNewsAdvancedsearch\Utility\ClassCacheManager']
    public: true

  NITSAN\NsNewsAdvancedsearch\EventListener\NewsControllerSettingsListener:
    tags:
      - name: event.listener
        identifier: 'ns-news-advancedsearch-newscontroller-overridesettings'
        event: GeorgRinger\News\Event\NewsControllerOverrideSettingsEvent

  NITSAN\NsNewsAdvancedsearch\EventListener\ModifyDemandRepositoryListener:
    tags:
      - name: event.listener
        identifier: 'ns-news-advancedsearch-modifydemand'
        event: GeorgRinger\News\Event\ModifyDemandRepositoryEvent